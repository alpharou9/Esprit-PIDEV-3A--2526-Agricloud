framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    php_errors:
        log: true

parameters:
    farms_upload_dir: '%kernel.project_dir%/public/uploads/farms'
    products_upload_dir: '%kernel.project_dir%/public/uploads/products'
    posts_upload_dir: '%kernel.project_dir%/public/uploads/posts'
    events_upload_dir: '%kernel.project_dir%/public/uploads/events'
